<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0a0d14">
  <title>POKESIM NZ WORKSPACE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>POKESIM NZ WORKSPACE</h1>
    <div class="stats">
      <span>Wallet: <b id="wallet-stat">$0.00</b></span>
      <span>Assets: <b id="asset-stat">$0.00</b></span>
      <span class="save-tools"><button id="export-btn">Export</button><button id="import-btn">Import</button></span>
    </div>
  </header>

  <nav class="tabs" aria-label="Workspace views">
    <button class="tab active" data-view="league">🏆 League</button>
    <button class="tab" data-view="packs">🛒 Packs</button>
    <button class="tab" data-view="binder">🎴 Binder</button>
    <button class="tab" data-view="market">⚖️ Market</button>
  </nav>

  <main>
    <section id="log" class="terminal" aria-live="polite"></section>

    <section id="league" class="view active">
      <div id="tournament-menu" class="league-list"></div>

      <div id="arena" class="arena hidden">
        <div class="opponent-zone">
          <div id="o-active" class="mat-zone active-zone">Opponent Active</div>
          <div id="o-hand" class="mat-zone">Opponent Hand<br><b>7</b></div>
          <div id="o-prizes" class="mat-zone prize-zone">Opponent Prizes<br><b>6</b></div>
        </div>

        <div class="tcg-board">
          <aside class="side-column">
            <div id="p-prizes" class="mat-zone prize-zone">Prize Cards<br><b>6</b></div>
          </aside>
          <section class="center-column">
            <div id="p-active" class="mat-zone active-zone">Active Pokémon</div>
            <div class="bench-grid">
              <div id="b1" class="mat-zone bench-slot">Bench 1</div>
              <div id="b2" class="mat-zone bench-slot">Bench 2</div>
              <div id="b3" class="mat-zone bench-slot">Bench 3</div>
              <div id="b4" class="mat-zone bench-slot">Bench 4</div>
              <div id="b5" class="mat-zone bench-slot">Bench 5</div>
            </div>
          </section>
          <aside class="side-column">
            <div id="deck-pile" class="mat-zone deck-zone">Deck Pile</div>
            <div id="discard-pile" class="mat-zone discard-zone">Discard Pile</div>
          </aside>
        </div>

        <div class="match-tools">
          <button id="coin-btn" class="coin-btn">COIN</button>
          <div id="status-node" class="status-node">Status: Clear</div>
          <div id="turn-node" class="status-node">Player Turn</div>
        </div>
        <div id="hand-row" class="hand-row"></div>

        <div class="action-row">
          <button id="attack-btn" class="primary">⚔️ Declare Attack</button>
          <button id="concede-btn" class="danger">🏳️ Concede Match</button>
        </div>
      </div>

      <div class="card-stage">
        <img id="card-render-img" alt="Current card render">
        <p id="card-meta">No card loaded.</p>
      </div>
    </section>

    <section id="packs" class="view">
      <div id="pack-container" class="shop-grid"></div>
    </section>

    <section id="binder" class="view">
      <div id="binder-container" class="binder-grid"></div>
    </section>

    <section id="market" class="view">
      <div id="market-container" class="market-grid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
